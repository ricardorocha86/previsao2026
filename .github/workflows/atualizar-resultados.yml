name: Atualizar resultados da Copa

on:
  schedule:
    # UTC (Brasília = UTC-3, sem horário de verão).
    # BRT 00:15/03:15/15:15/18:15/21:15/22:15 -> UTC 03:15/06:15/18:15/21:15/00:15/01:15.
    - cron: '15 0,1,3,6,18,21 * * *'
  workflow_dispatch:   # botão "Run workflow" na aba Actions

permissions:
  contents: write

concurrency:
  group: atualizar-resultados-main
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instala dependências
        run: pip install requests

      - name: Pega o script do repo do app (público, sem token)
        run: git clone --depth 1 https://github.com/ricardorocha86/previsao2026app _app

      - name: Atualiza resultados_jogos.json
        run: |
          # Garante que a extração sempre parte do estado mais recente publicado
          # no GitHub. Um push concorrente fará o job falhar com segurança, sem
          # reescrever histórico.
          git pull --ff-only origin main
          python _app/extracao/atualizar_resultados.py \
            --saidas assets/resultados_jogos.json \
            --previsoes assets/previsoes_jogos.json

      - name: Commit + push (só se mudou)
        id: commit
        run: |
          if [[ -n "$(git status --porcelain assets/resultados_jogos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/resultados_jogos.json
            git commit -m "Atualiza resultados da Copa (automático)"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            echo "Nada mudou — nenhum jogo novo encerrado."
          fi

      - name: Deploy Vercel do commit atualizado
        if: steps.commit.outputs.changed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_jeBRd9WRPWSBhJEibXDzcEy4
          VERCEL_PROJECT_ID: prj_zUFTSZF1u4ulKEmUsZXQaj2ieW6E
        run: |
          if [[ -z "$VERCEL_TOKEN" ]]; then
            echo "::error::Configure o secret VERCEL_TOKEN no GitHub para publicar automaticamente os commits gerados pelo atualizador."
            exit 1
          fi

          echo "Publicando no Vercel o commit ${{ steps.commit.outputs.sha }}..."
          npx --yes vercel@54.14.2 pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx --yes vercel@54.14.2 build --prod --token="$VERCEL_TOKEN"
          npx --yes vercel@54.14.2 deploy --prebuilt --prod --token="$VERCEL_TOKEN"
