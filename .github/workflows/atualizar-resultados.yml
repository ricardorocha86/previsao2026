name: Atualizar resultados da Copa

on:
  schedule:
    # UTC (Brasília = UTC-3, sem horário de verão).
    # BRT 00:15/03:15/15:15/18:15/21:15/22:15 -> UTC 03:15/06:15/18:15/21:15/00:15/01:15.
    - cron: '15 0,1,3,6,18,21 * * *'
  workflow_dispatch:   # botão "Run workflow" na aba Actions

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instala dependências
        run: pip install requests

      - name: Pega o script do repo do app (público, sem token)
        run: git clone --depth 1 https://github.com/ricardorocha86/previsao2026app _app

      - name: Atualiza resultados_jogos.json
        run: >
          python _app/extracao/atualizar_resultados.py
          --saidas assets/resultados_jogos.json
          --previsoes assets/previsoes_jogos.json

      - name: Commit + push (só se mudou)
        run: |
          if [[ -n "$(git status --porcelain assets/resultados_jogos.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/resultados_jogos.json
            git commit -m "Atualiza resultados da Copa (automático)"
            git push
          else
            echo "Nada mudou — nenhum jogo novo encerrado."
          fi
